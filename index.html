<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務ナビ</title>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f5f3;color:#1a1a18;padding:20px;min-height:100vh}
.container{max-width:900px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;border:0.5px solid #e0ddd5}
.header{padding:0 0 14px;border-bottom:0.5px solid #e0ddd5;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:20px;font-weight:500;color:#1a1a18}
.header-left p{font-size:12px;color:#73726c;margin-top:3px}
.edit-toggle{display:inline-block;padding:4px 10px;font-size:11px;border:0.5px solid #c8c6be;border-radius:6px;background:transparent;color:#9c9a92;cursor:pointer;transition:all .15s}
.edit-toggle:hover{color:#73726c;border-color:#888780}
.edit-toggle.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.edit-banner{background:#E1F5EE;border:0.5px solid #9FE1CB;border-radius:8px;padding:8px 14px;font-size:12px;color:#085041;margin-bottom:14px;display:none}
.edit-banner.show{display:block}
.search-bar{margin-bottom:16px;position:relative}
.search-bar .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#9c9a92;pointer-events:none;z-index:1}
.search-bar input{width:100%;padding:11px 14px 11px 42px;font-size:14px;border:1px solid #c8c6be;border-radius:10px;background:#f9f9f8;color:#1a1a18;outline:none;transition:all .2s}
.search-bar input:focus{border-color:#534AB7;background:#fff;box-shadow:0 0 0 3px rgba(83,74,183,0.1)}
.search-bar input::placeholder{color:#9c9a92}
/* 検索結果2ジャンル */
.search-results{border:0.5px solid #c8c6be;border-radius:12px;margin-bottom:16px;overflow:hidden;display:none}
.search-results.show{display:block}
.sr-section{padding:12px 16px}
.sr-section+.sr-section{border-top:0.5px solid #e0ddd5}
.sr-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sr-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.sr-badge.app{background:#E1F5EE;color:#0F6E56}
.sr-badge.drive{background:#E6F1FB;color:#185FA5}
.sr-title{font-size:12px;font-weight:500;color:#1a1a18}
.sr-count{font-size:10px;color:#9c9a92;margin-left:auto}
.sr-item{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:6px;text-decoration:none;color:#1a1a18;font-size:12px;transition:background .12s}
.sr-item:hover{background:#f5f5f3}
.sr-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sr-cat{font-size:10px;color:#9c9a92;padding:1px 5px;background:#f5f5f3;border-radius:4px;flex-shrink:0;margin-left:auto}
.sr-drive-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f5f5f3;border-radius:8px;text-decoration:none;color:#185FA5;font-size:12px;font-weight:500;transition:background .12s;margin-top:6px}
.sr-drive-btn:hover{background:#e8e8e6}
.sr-drive-btn svg{width:14px;height:14px;flex-shrink:0}
.sr-drive-sub{font-size:10px;color:#73726c;font-weight:400}
.sr-empty{font-size:11px;color:#9c9a92;padding:2px 0}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);border:0.5px solid #c8c6be;border-radius:12px;overflow:hidden;margin-bottom:20px}
.tab{padding:12px 8px;text-align:center;cursor:pointer;background:#fff;border-right:0.5px solid #e0ddd5;transition:background .12s}
.tab:last-child{border-right:none}
.tab:hover{background:#f5f5f3}
.tab.active{background:#f5f5f3}
.tab-indicator{width:28px;height:3px;border-radius:2px;margin:0 auto 6px}
.tab-label{font-size:13px;font-weight:500}
.sg-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sg-section-label{font-size:12px;color:#73726c;font-weight:500}
.sg-add-btn{font-size:12px;padding:3px 10px;border:0.5px solid #c8c6be;border-radius:8px;background:transparent;color:#73726c;cursor:pointer;display:none}
.sg-add-btn.show{display:block}
.sg-row{margin-bottom:0}
.sg-row-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:0}
.sg-card{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;padding:16px 10px 12px;cursor:pointer;text-align:center;position:relative;transition:border-color .15s}
.sg-card:hover{border-color:#888780}
.sg-card.active{border-color:#888780;background:#f5f5f3}
.sg-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.sg-icon svg{width:20px;height:20px}
.sg-label{font-size:13px;font-weight:500;color:#1a1a18;margin-bottom:2px;line-height:1.4}
.sg-count{font-size:11px;color:#9c9a92}
.sg-edit-bar{display:none;gap:4px;justify-content:center;margin-top:6px}
.sg-edit-bar.show{display:flex}
.mini-btn{font-size:11px;padding:2px 7px;border:0.5px solid #c8c6be;border-radius:4px;background:#fff;cursor:pointer;color:#73726c}
.mini-btn.danger{color:#c0392b}
.row-panel{background:#f5f5f3;border:0.5px solid #e0ddd5;border-radius:12px;padding:14px 20px;margin-top:10px;margin-bottom:10px;display:none}
.row-panel.open{display:block}
.lp-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid #e0ddd5}
.lp-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lp-icon svg{width:14px;height:14px}
.lp-title{font-size:14px;font-weight:500;color:#1a1a18;flex:1}
.lp-count{font-size:12px;color:#73726c}
.item-add-btn{font-size:12px;padding:3px 10px;border:none;color:#fff;background:#1D9E75;border-radius:8px;cursor:pointer;font-weight:500;display:none}
.item-add-btn.show{display:block}
.link-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:2px}
.link-item{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:8px;text-decoration:none;color:#1a1a18;transition:background .12s}
.link-item:hover{background:#fff}
.link-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.link-text{font-size:13px;flex:1}
.empty{font-size:13px;color:#73726c;padding:4px 0}
/* AI検索ボックス */
.ai-search-section{background:#f5f5f3;border:0.5px solid #AFA9EC;border-radius:12px;padding:16px 20px;margin-bottom:20px}
.ai-search-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-badge{font-size:11px;font-weight:500;padding:2px 8px;background:#EEEDFE;color:#3C3489;border-radius:10px}
.ai-search-title{font-size:14px;font-weight:500;color:#1a1a18}
.ai-search-desc{font-size:12px;color:#73726c;margin-bottom:12px;line-height:1.6}
.ai-input-row{display:flex;gap:8px;margin-bottom:10px}
.ai-input{flex:1;padding:10px 14px;font-size:14px;border:1px solid #AFA9EC;border-radius:8px;background:#fff;color:#1a1a18;outline:none}
.ai-input:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,0.1)}
.ai-input::placeholder{color:#b0aee0}
.ai-btn{padding:10px 20px;font-size:13px;background:#534AB7;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:500;white-space:nowrap;transition:background .15s}
.ai-btn:hover{background:#3C3489}
.ai-open-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;font-size:13px;background:#534AB7;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:500}
.ai-open-btn:hover{background:#3C3489}
.ai-open-btn svg{width:16px;height:16px}
/* iframe埋め込み */
.nb-embed{display:none;margin-top:12px}
.nb-embed.show{display:block}
.nb-frame-wrap{border:0.5px solid #AFA9EC;border-radius:10px;overflow:hidden}
.nb-frame-header{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#EEEDFE;border-bottom:0.5px solid #AFA9EC}
.nb-frame-header svg{width:14px;height:14px;color:#534AB7}
.nb-frame-title{font-size:11px;color:#534AB7;font-weight:500;flex:1}
.nb-frame-btns{display:flex;gap:6px}
.nb-frame-btn{font-size:10px;color:#73726c;text-decoration:none;padding:2px 8px;border:0.5px solid #c8c6be;border-radius:4px;background:#fff;cursor:pointer}
.nb-frame-btn:hover{background:#f5f5f3}
.nb-iframe{width:100%;height:500px;border:none;background:#fff}
.nb-blocked{padding:20px;text-align:center;background:#fff}
.nb-blocked-icon{font-size:24px;margin-bottom:8px}
.nb-blocked-text{font-size:13px;color:#73726c;margin-bottom:12px;line-height:1.7}
.nb-blocked-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;background:#534AB7;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:500;text-decoration:none}
.nb-blocked-btn:hover{background:#3C3489}
.ai-setup-note{font-size:11px;color:#73726c;margin-top:8px;padding:6px 10px;background:#ebebeb;border-radius:6px}
/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:100;align-items:flex-start;justify-content:center;padding-top:60px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:0.5px solid #c8c6be;padding:24px;width:100%;max-width:400px}
.modal h2{font-size:15px;font-weight:500;margin-bottom:14px;color:#1a1a18}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#73726c;margin-bottom:3px}
.field input,.field select{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid #c8c6be;border-radius:8px;background:#fff;color:#1a1a18;outline:none}
.field input:focus,.field select:focus{border-color:#888780}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.btn{padding:6px 14px;font-size:13px;border:0.5px solid #c8c6be;border-radius:8px;background:transparent;color:#73726c;cursor:pointer}
.btn-green{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:500}
/* --- 画面幅に応じた列数切り替え --- */
/* 広い画面（1200px以上）→ 6列 */
@media(min-width:1200px){
  .container{max-width:1100px}
  .sg-row-cards{grid-template-columns:repeat(6,1fr)}
}
/* やや広い画面（1000px〜1199px）→ 5列 */
@media(min-width:1000px) and (max-width:1199px){
  .container{max-width:960px}
  .sg-row-cards{grid-template-columns:repeat(5,1fr)}
}
/* 通常PC（768px〜999px）→ 4列 */
/* デフォルトの4列がそのまま適用 */
/* タブレット（600px〜767px）→ 3列 */
@media(max-width:767px){
  body{padding:10px}
  .container{padding:14px;border-radius:12px}
  .header{flex-direction:column;align-items:flex-start;gap:10px}
  .edit-toggle{width:100%;text-align:center;padding:10px 14px;font-size:14px}
  .tabs{grid-template-columns:repeat(4,1fr)}
  .tab{padding:10px 4px}
  .tab-label{font-size:12px}
  .sg-row-cards{grid-template-columns:repeat(3,1fr);gap:8px}
  .sg-card{padding:14px 8px 10px}
  .sg-icon{width:36px;height:36px}
  .sg-label{font-size:12px}
  .link-list{grid-template-columns:1fr}
  .link-item{padding:10px 8px;min-height:44px}
  .link-text{font-size:14px}
  .row-panel{padding:12px 14px}
  .ai-input-row{flex-direction:column}
  .ai-btn{width:100%;padding:12px;font-size:14px}
  .ai-input{font-size:14px;padding:12px 14px}
  .search-bar input{font-size:14px;padding:12px 14px 12px 42px}
  .modal-overlay{padding-top:20px;align-items:center}
  .modal{margin:0 10px;max-width:none;padding:20px}
  .modal h2{font-size:16px}
  .field input,.field select{padding:12px 10px;font-size:14px}
  .btn{padding:10px 16px;font-size:14px}
  .mini-btn{font-size:12px;padding:4px 10px}
  .item-add-btn{padding:8px 14px;font-size:13px}
  .sg-add-btn{padding:6px 12px;font-size:13px}
}
/* スマホ（480px以下）→ 2列 */
@media(max-width:480px){
  .tabs{grid-template-columns:repeat(2,1fr)}
  .tab{padding:12px 6px}
  .tab-label{font-size:11px}
  .sg-row-cards{grid-template-columns:repeat(2,1fr)}
  .header-left h1{font-size:18px}
}
/* Google Sync UI */
.sync-area{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-login-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;border:0.5px solid #c8c6be;border-radius:6px;background:#fff;color:#73726c;cursor:pointer;transition:all .15s;white-space:nowrap}
.sync-login-btn:hover{color:#1a1a18;border-color:#888780;background:#f9f9f8}
.sync-login-btn svg{width:14px;height:14px;flex-shrink:0}
.sync-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#73726c;white-space:nowrap}
.sync-status .sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-status .sync-dot.ok{background:#1D9E75}
.sync-status .sync-dot.busy{background:#D4A017;animation:syncPulse 1s infinite}
.sync-status .sync-dot.off{background:#c8c6be}
.sync-user-info{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#73726c}
.sync-user-info img{width:20px;height:20px;border-radius:50%}
.sync-logout-btn{font-size:10px;color:#9c9a92;cursor:pointer;border:none;background:none;text-decoration:underline}
.sync-logout-btn:hover{color:#73726c}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:767px){
  .sync-area{width:100%;justify-content:flex-end}
  .sync-login-btn{font-size:12px;padding:8px 14px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="header-left">
    <h1 id="app-title">業務ナビ</h1>
    <p>カテゴリを選んで、必要なアプリ・マニュアルを探してください</p>
  </div>
  <div class="sync-area" id="sync-area">
    <button class="sync-login-btn" id="sync-login-btn" onclick="handleGoogleLogin()" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15.5 3H5a2 2 0 00-2 2v14c0 1.1.9 2 2 2h14a2 2 0 002-2V8.5L15.5 3z"/><path d="M15 3v6h6"/></svg>
      Googleアカウントでログイン
    </button>
    <span class="sync-status" id="sync-status" style="display:none">
      <span class="sync-dot off" id="sync-dot"></span>
      <span id="sync-text">オフライン</span>
    </span>
    <span class="sync-user-info" id="sync-user-info" style="display:none"></span>
    <button class="sync-logout-btn" id="sync-logout-btn" style="display:none" onclick="handleGoogleLogout()">ログアウト</button>
  </div>
</div>
<div class="edit-banner" id="edit-banner">編集モード中です。ブロックの追加・リンクの追加・変更ができます。</div>
<div class="search-bar">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="search-input" placeholder="キーワードで検索（登録リンク＋Googleドライブ）" oninput="onSearch()">
</div>
<div class="search-results" id="search-results">
  <div class="sr-section">
    <div class="sr-header">
      <span class="sr-badge app">アプリ内</span>
      <span class="sr-title">リンク登録済み</span>
      <span class="sr-count" id="sr-app-count"></span>
    </div>
    <div id="sr-app-list"></div>
  </div>
  <div class="sr-section">
    <div class="sr-header">
      <span class="sr-badge drive">Google ドライブ</span>
      <span class="sr-title">ドライブ上のファイル</span>
    </div>
    <div id="sr-drive-list"></div>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div id="ai-search-area"></div>
<div class="sg-section-header">
  <div class="sg-section-label" id="sg-section-label"></div>
  <button class="sg-add-btn" id="sg-add-btn" onclick="openSgModal()">+ ブロックを追加</button>
</div>
<div id="sg-rows"></div>
<div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:10px">
<button id="undo-btn" disabled style="font-size:11px;padding:4px 10px;border:0.5px solid #c8c6be;border-radius:6px;background:#fff;color:#73726c;cursor:pointer;display:none;align-items:center;gap:4px;opacity:0.4;transition:opacity .2s" onclick="undoLast()"><span style="font-size:14px">↩</span> 元に戻す</button>
<button class="edit-toggle" id="edit-toggle" onclick="toggleEdit()">編集画面に移動</button>
</div>
<!-- ブロック追加モーダル -->
<div class="modal-overlay" id="sg-modal-bg">
  <div class="modal">
    <h2 id="sg-modal-title">ブロックを追加</h2>
    <div class="field"><label>カテゴリ</label><select id="sg-f-cat"></select></div>
    <div class="field"><label>ブロック名</label><input type="text" id="sg-f-name" placeholder="例：施工説明書"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeSgModal()">キャンセル</button>
      <button class="btn btn-green" onclick="saveSg()">保存</button>
    </div>
  </div>
</div>
<!-- 項目追加モーダル -->
<div class="modal-overlay" id="item-modal-bg">
  <div class="modal">
    <h2 id="item-modal-title">項目を追加</h2>
    <div class="field"><label>名前</label><input type="text" id="f-name" placeholder="例：キッチン施工説明書"></div>
    <div class="field"><label>リンクURL</label><input type="text" id="f-url" placeholder="https://..."></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeItemModal()">キャンセル</button>
      <button class="btn btn-green" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>
</div>
<script>
const COLS = 4;
let isEdit = false, editIndex = null, activeCat = '検査', activeSg = null, editSgIndex = null;

// ═══════════════════════════════════════════════════════
//  Google Sheets Integration Constants
// ═══════════════════════════════════════════════════════
const OAUTH_CLIENT_ID = '261087242588-i5u578a5fpi1chomkur6gffv1tq5f7k2.apps.googleusercontent.com';
const SPREADSHEET_ID = '1UgO0Y_IOD_ASwzrZLP-JcG0sfiMxs9GEI7s02J0Ifoc';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.readonly';
const REDIRECT_URI = window.location.origin + '/gyomu-navi/';
const SHEET_BLOCKS = 'ブロック一覧';
const SHEET_LINKS = 'リンク一覧';
const SHEET_SETTINGS = '⚙ 設定';

let gapiInited = false;
let accessToken = null;
let googleUser = null;
let isSyncing = false;
let authChecked = false;

// ── Check for OAuth redirect result in URL hash ──
function checkRedirectResult() {
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    const expiresIn = parseInt(params.get('expires_in') || '3600');
    if (token) {
      accessToken = token;
      const expiresAt = Date.now() + expiresIn * 1000;
      localStorage.setItem('gyomu_gtoken', JSON.stringify({
        access_token: token, expires_at: expiresAt
      }));
      // Clean up URL hash
      history.replaceState(null, '', window.location.pathname + window.location.search);
      // Fetch user info
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: 'Bearer ' + token }
      }).then(function(r) { return r.json(); }).then(function(info) {
        googleUser = { name: info.name || info.email, email: info.email, picture: info.picture };
        localStorage.setItem('gyomu_guser', JSON.stringify(googleUser));
        showLoggedIn();
        onAuthReady();
      }).catch(function() {
        showLoggedIn();
        onAuthReady();
      });
      return true;
    }
  }
  // Check for error in redirect (e.g. user denied)
  if (hash && hash.includes('error')) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
  return false;
}

// ── Check cached token ──
function checkCachedToken() {
  const cached = localStorage.getItem('gyomu_gtoken');
  if (cached) {
    try {
      const t = JSON.parse(cached);
      if (t.access_token && t.expires_at && Date.now() < t.expires_at) {
        accessToken = t.access_token;
        const ui = localStorage.getItem('gyomu_guser');
        if (ui) googleUser = JSON.parse(ui);
        showLoggedIn();
        return true;
      }
    } catch(e) {}
    localStorage.removeItem('gyomu_gtoken');
  }
  return false;
}

// ── Redirect to Google OAuth (implicit grant) ──
function redirectToGoogleLogin() {
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth' +
    '?client_id=' + encodeURIComponent(OAUTH_CLIENT_ID) +
    '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
    '&response_type=token' +
    '&scope=' + encodeURIComponent(SCOPES) +
    '&include_granted_scopes=true' +
    '&prompt=select_account';
  window.location.href = authUrl;
}

// ── Google API initialization (gapi only, no GIS needed) ──
function initGapiClient() {
  gapi.client.init({}).then(function() {
    return Promise.all([
      gapi.client.load('sheets', 'v4'),
      gapi.client.load('drive', 'v3')
    ]);
  }).then(function() {
    gapiInited = true;
    onAuthReady();
  });
}

function gapiLoaded() {
  gapi.load('client', initGapiClient);
}

// ── Called when both auth + gapi are ready ──
function onAuthReady() {
  if (!gapiInited || !accessToken) return;
  gapi.client.setToken({ access_token: accessToken });
  syncFromSheets();
}

// ── Auth flow entry point ──
function startAuthFlow() {
  if (authChecked) return;
  authChecked = true;
  // Step 1: Check if returning from Google OAuth redirect
  if (checkRedirectResult()) return; // Will call onAuthReady after user info fetch
  // Step 2: Check cached token
  if (checkCachedToken()) {
    onAuthReady();
    return;
  }
  // Step 3: No token — redirect to Google login
  redirectToGoogleLogin();
}

function handleGoogleLogin() {
  redirectToGoogleLogin();
}

function handleGoogleLogout() {
  if (accessToken && typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
    google.accounts.oauth2.revoke(accessToken, function() {});
  }
  accessToken = null;
  googleUser = null;
  if (gapiInited) gapi.client.setToken(null);
  localStorage.removeItem('gyomu_gtoken');
  localStorage.removeItem('gyomu_guser');
  showLoggedOut();
}

// ── Read from Google Sheets ──
async function syncFromSheets() {
  if (!accessToken || isSyncing) return;
  isSyncing = true;
  setSyncStatus('busy', '同期中...');
  try {
    const resp = await gapi.client.sheets.spreadsheets.values.batchGet({
      spreadsheetId: SPREADSHEET_ID,
      ranges: [
        SHEET_BLOCKS + '!A2:F',
        SHEET_LINKS + '!A2:F',
        "'" + SHEET_SETTINGS + "'!B7:C19"
      ]
    });
    const ranges = resp.result.valueRanges || [];
    const blockRows = (ranges[0] && ranges[0].values) || [];
    const linkRows = (ranges[1] && ranges[1].values) || [];
    const settingsRows = (ranges[2] && ranges[2].values) || [];

    // Parse settings
    const settings = {};
    settingsRows.forEach(row => {
      if (row[0] && row[1] !== undefined) settings[row[0].trim()] = row[1];
    });
    applySettings(settings);

    // Parse blocks → subgroups
    const newSubgroups = {};
    cats.forEach(c => { newSubgroups[c.key] = []; });
    blockRows.forEach(row => {
      const cat = (row[0] || '').trim();
      const blockName = (row[1] || '').trim();
      const icon = (row[2] || 'doc').trim();
      if (cat && blockName) {
        if (!newSubgroups[cat]) newSubgroups[cat] = [];
        // Maintain order from spreadsheet (並び順 in col D is informational)
        newSubgroups[cat].push({ key: blockName, icon: icon });
      }
    });

    // Parse links → data
    const newData = [];
    linkRows.forEach(row => {
      const cat = (row[0] || '').trim();
      const sg = (row[1] || '').trim();
      const name = (row[2] || '').trim();
      const url = (row[3] || '').trim();
      if (cat && sg && name) {
        newData.push({ cat, sg, name, url });
      }
    });

    subgroups = newSubgroups;
    data = newData;

    // Update localStorage cache
    localStorage.setItem('gyomu_subgroups', JSON.stringify(subgroups));
    localStorage.setItem('gyomu_data', JSON.stringify(data));

    // Re-render
    activeSg = null;
    renderTabs(); renderAiSearch(); renderRows();
    setSyncStatus('ok', '同期済み ✓');
    isSyncing = false;
  } catch(e) {
    console.error('Sheets read error:', e);
    setSyncStatus('off', '同期エラー');
    isSyncing = false;
    showSaveNotice('⚠ スプレッドシート読み込みに失敗しました');
  }
}

function applySettings(settings) {
  // Apply known settings from ◎設定 sheet
  // Keys match the B column values in the settings sheet exactly
  if (settings['NotebookLM URL']) {
    NOTEBOOKLM_URL = settings['NotebookLM URL'];
  }
  if (settings['アプリ名']) {
    const titleEl = document.getElementById('app-title');
    if (titleEl) titleEl.textContent = settings['アプリ名'];
    document.title = settings['アプリ名'];
  }
  if (settings['OAuth クライアントID']) {
    // OAuth Client ID is already set as constant, but log for debugging
    console.log('Settings: OAuth Client ID found in sheet');
  }
  if (settings['検索表示件数']) {
    // Could be used to limit Drive search results
    console.log('Settings: 検索表示件数 =', settings['検索表示件数']);
  }
}

// ── Write to Google Sheets ──
async function syncToSheets() {
  if (!accessToken) return;
  isSyncing = true;
  setSyncStatus('busy', '保存中...');
  const today = new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '/');
  try {
    // Build block rows
    const blockValues = [];
    let order = 1;
    cats.forEach(c => {
      (subgroups[c.key] || []).forEach(sg => {
        blockValues.push([c.key, sg.key, sg.icon, order++, today, today]);
      });
    });

    // Build link rows
    const linkValues = [];
    data.forEach(d => {
      linkValues.push([d.cat, d.sg, d.name, d.url, today, today]);
    });

    // Clear and write blocks
    await gapi.client.sheets.spreadsheets.values.clear({
      spreadsheetId: SPREADSHEET_ID,
      range: SHEET_BLOCKS + '!A2:F'
    });
    if (blockValues.length > 0) {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SPREADSHEET_ID,
        range: SHEET_BLOCKS + '!A2:F' + (blockValues.length + 1),
        valueInputOption: 'RAW',
        resource: { values: blockValues }
      });
    }

    // Clear and write links
    await gapi.client.sheets.spreadsheets.values.clear({
      spreadsheetId: SPREADSHEET_ID,
      range: SHEET_LINKS + '!A2:F'
    });
    if (linkValues.length > 0) {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SPREADSHEET_ID,
        range: SHEET_LINKS + '!A2:F' + (linkValues.length + 1),
        valueInputOption: 'RAW',
        resource: { values: linkValues }
      });
    }

    setSyncStatus('ok', '同期済み ✓');
    isSyncing = false;
  } catch(e) {
    console.error('Sheets write error:', e);
    setSyncStatus('off', '同期エラー');
    isSyncing = false;
    showSaveNotice('⚠ スプレッドシートへの書き込みに失敗しました');
  }
}

// Wait for gapi to load, then start auth flow
function waitForGapi() {
  if (gapiInited) return;
  if (typeof gapi !== 'undefined' && gapi.load) {
    gapiLoaded();
  } else {
    setTimeout(waitForGapi, 150);
  }
}
// Start: check auth immediately, then wait for gapi
setTimeout(function() {
  startAuthFlow();
  waitForGapi();
}, 100);

const UNDO_MAX = 30;
let undoStack = [];
function loadFromStorage() {
  try {
    const sg = localStorage.getItem('gyomu_subgroups');
    const dt = localStorage.getItem('gyomu_data');
    const us = localStorage.getItem('gyomu_undo');
    if (sg) subgroups = JSON.parse(sg);
    if (dt) data = JSON.parse(dt);
    if (us) undoStack = JSON.parse(us);
    updateUndoBtn();
  } catch(e) {}
}
function pushUndo() {
  undoStack.push({
    subgroups: JSON.parse(JSON.stringify(subgroups)),
    data: JSON.parse(JSON.stringify(data))
  });
  if (undoStack.length > UNDO_MAX) undoStack.shift();
}
function saveToStorage() {
  try {
    localStorage.setItem('gyomu_subgroups', JSON.stringify(subgroups));
    localStorage.setItem('gyomu_data', JSON.stringify(data));
    localStorage.setItem('gyomu_undo', JSON.stringify(undoStack));
    updateUndoBtn();
    showSaveNotice('✓ 保存しました');
  } catch(e) {}
  // If logged in, also write to Sheets
  if (accessToken) {
    syncToSheets();
  }
}
function undoLast() {
  if (!undoStack.length) return;
  const prev = undoStack.pop();
  subgroups = prev.subgroups;
  data = prev.data;
  activeSg = null;
  try {
    localStorage.setItem('gyomu_subgroups', JSON.stringify(subgroups));
    localStorage.setItem('gyomu_data', JSON.stringify(data));
    localStorage.setItem('gyomu_undo', JSON.stringify(undoStack));
  } catch(e) {}
  updateUndoBtn();
  renderTabs(); renderAiSearch(); renderRows();
  showSaveNotice('↩ 1つ前の状態に戻しました');
  // Sync undo to Sheets too
  if (accessToken) { syncToSheets(); }
}
function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (btn) {
    btn.style.display = isEdit ? 'flex' : 'none';
    btn.disabled = !undoStack.length;
    btn.style.opacity = undoStack.length ? '1' : '0.4';
    btn.title = undoStack.length ? `元に戻す（残り${undoStack.length}回）` : '戻せる操作はありません';
  }
}
function resetStorage() {
  if (confirm('デモデータを初期状態に戻しますか？')) {
    localStorage.removeItem('gyomu_subgroups');
    localStorage.removeItem('gyomu_data');
    localStorage.removeItem('gyomu_undo');
    location.reload();
  }
}

      <div id="ai-clipboard-msg" style="display:none;margin-top:8px;padding:8px 12px;background:#E1F5EE;border:0.5px solid #9FE1CB;border-radius:8px;font-size:12px;color:#085041;text-align:center">質問をクリップボードにコピーしました。NotebookLM内のチャット欄に貼り付けて送信してください。</div>
    </div>
    ${!hasUrl ? '<div class="ai-setup-note">※ 設定エリアの【2】NOTEBOOKLM_URL にURLを貼り付けると使えるようになります。</div>' : ''}
  </div>`;
}
let nbOpen = false;
function toggleNotebook() {
  nbOpen = !nbOpen;
  const el = document.getElementById('nb-embed');
  if (el) el.classList.toggle('show', nbOpen);
}
function openNotebookWithQuestion() {
  const input = document.getElementById('ai-question-input');
  const question = input ? input.value.trim() : '';
  if (!question) { if(input) input.focus(); return; }
  // NotebookLM埋め込みを開く
  nbOpen = true;
  const el = document.getElementById('nb-embed');
  if (el) el.classList.add('show');
  // NotebookLMはiframe内で直接質問を渡せないため、
  // 質問テキストをクリップボードにコピーして案内する
  navigator.clipboard.writeText(question).then(() => {
    const msg = document.getElementById('ai-clipboard-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => { msg.style.display = 'none'; }, 4000); }
  }).catch(() => {});
}
function closeNotebook() {
  nbOpen = false;
  const el = document.getElementById('nb-embed');
  if (el) el.classList.remove('show');
}
function checkIframeLoad() {
  // iframeが読み込まれた後、ブロックされていないか確認
  // ※ クロスオリジン制約でアクセスできない場合もあるため、エラーハンドリング
  try {
    const iframe = document.getElementById('nb-iframe');
    if (iframe && iframe.contentDocument && iframe.contentDocument.title === '') {
      showBlocked();
    }
  } catch(e) {
    // クロスオリジンエラーは正常（読み込めている可能性あり）
  }
}
function showBlocked() {
  const iframe = document.getElementById('nb-iframe');
  if (!iframe) return;
  iframe.outerHTML = `<div class="nb-blocked">
    <div class="nb-blocked-icon">🔒</div>
    <div class="nb-blocked-text">NotebookLMは埋め込みをブロックしています。<br>下のボタンからNotebookLMを別タブで開いてご利用ください。</div>
    <a class="nb-blocked-btn" href="${NOTEBOOKLM_URL}" target="_blank" rel="noopener">
      NotebookLM を開く ↗
    </a>
  </div>`;
}
function getVisualCols() {
  const w = window.innerWidth;
  if (w <= 480) return 2;
  if (w <= 767) return 3;
  if (w <= 999) return 4;
  if (w <= 1199) return 5;
  return 6;
}
// 画面リサイズ時に再描画
window.addEventListener('resize', () => { renderRows(); });
function renderRows() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const sgs = subgroups[activeCat] || [];
  const cat = getCat(activeCat);
  document.getElementById('sg-section-label').textContent = activeCat + ' のブロック一覧';
  document.getElementById('sg-add-btn').className = 'sg-add-btn' + (isEdit ? ' show' : '');
  const visCols = getVisualCols();
  // activeSgが何行目にいるか（画面上の行）
  const activeSgIdx = activeSg ? sgs.findIndex(sg => sg.key === activeSg) : -1;
  const activeVisRow = activeSgIdx >= 0 ? Math.floor(activeSgIdx / visCols) : -1;
  // 画面上の行ごとにグループ化
  const visRows = [];
  for (let i = 0; i < sgs.length; i += visCols) visRows.push(sgs.slice(i, i + visCols));
  let html = '';
  visRows.forEach((rowSgs, rowIdx) => {
    const cardsHtml = rowSgs.map((sg, colIdx) => {
      const globalIdx = rowIdx * visCols + colIdx;
      const count = q
        ? data.filter(d => d.cat === activeCat && d.sg === sg.key && d.name.toLowerCase().includes(q)).length
        : data.filter(d => d.cat === activeCat && d.sg === sg.key).length;
      const isActive = activeSg === sg.key;
      const editBtns = isEdit ? `<div class="sg-edit-bar show">
        <button class="mini-btn" onclick="event.stopPropagation();openSgEditModal(${globalIdx})">名前変更</button>
        <button class="mini-btn danger" onclick="event.stopPropagation();deleteSg(${globalIdx})">削除</button>
      </div>` : '';
      return `<div class="sg-card${isActive ? ' active' : ''}" onclick="selectSg('${sg.key}')" style="${isActive ? 'border-color:' + cat.color : ''}">
        <div class="sg-icon" style="background:${cat.light};color:${cat.color}">${svgs[sg.icon] || svgs.doc}</div>
        <div class="sg-label">${sg.key}</div>
        <div class="sg-count">${count}件</div>
        ${editBtns}
      </div>`;
    }).join('');
    const empties = Array(visCols - rowSgs.length).fill('<div></div>').join('');
    let panelHtml = '';
    if (rowIdx === activeVisRow && activeSg) {
      const activeSgObj = sgs.find(sg => sg.key === activeSg);
      if (activeSgObj) {
        const items = data.filter(d => d.cat === activeCat && d.sg === activeSgObj.key && (!q || d.name.toLowerCase().includes(q)));
        const linksHtml = !items.length ? '<div class="empty">まだ項目がありません</div>' : items.map(item => {
          const idx = data.indexOf(item);
          const ab = isEdit ? `<button class="mini-btn" onclick="event.preventDefault();openItemEditModal(${idx})">編集</button><button class="mini-btn danger" onclick="event.preventDefault();deleteItem(${idx})">削除</button>` : '';
          return `<a class="link-item" href="${item.url}" target="_blank" rel="noopener"><span class="link-dot" style="background:${cat.color}"></span><span class="link-text">${item.name}</span>${ab}</a>`;
        }).join('');
        const addBtn = isEdit ? `<button class="item-add-btn show" onclick="openItemModal()">+ 項目を追加</button>` : '';
        panelHtml = `<div class="row-panel open">
          <div class="lp-header">
            <div class="lp-icon" style="background:${cat.light};color:${cat.color}">${svgs[activeSgObj.icon] || svgs.doc}</div>
            <div class="lp-title">${activeSgObj.key}</div>
            <div class="lp-count">${items.length}件</div>
            ${addBtn}
          </div>
          <div class="link-list">${linksHtml}</div>
        </div>`;
      }
    }
    html += `<div class="sg-row"><div class="sg-row-cards">${cardsHtml}${empties}</div>${panelHtml}</div>`;
  });
  document.getElementById('sg-rows').innerHTML = html;
}
function selectCat(cat) { activeCat = cat; activeSg = null; renderTabs(); renderAiSearch(); renderRows(); }
function selectSg(sg) { activeSg = activeSg === sg ? null : sg; renderRows(); }
function onSearch() {
  const q = document.getElementById('search-input').value.trim();
  const panel = document.getElementById('search-results');
  if (!q) { panel.classList.remove('show'); renderRows(); return; }
  panel.classList.add('show');
  const ql = q.toLowerCase();

  // ── ジャンル1: アプリ内リンク登録済み ──
  const appResults = data.filter(d => d.name.toLowerCase().includes(ql));
  document.getElementById('sr-app-count').textContent = appResults.length + '件';
  document.getElementById('sr-app-list').innerHTML = appResults.length === 0
    ? '<div class="sr-empty">該当する項目はありません</div>'
    : appResults.map(item => {
        const cat = getCat(item.cat);
        return `<a class="sr-item" href="${item.url}" target="_blank" rel="noopener">
          <span class="sr-dot" style="background:${cat.color}"></span>
          <span>${item.name}</span>
          <span class="sr-cat">${item.cat} ＞ ${item.sg}</span>
        </a>`;
      }).join('');

  // ── ジャンル2: Googleドライブ検索 ──
  if (accessToken && gapiInited) {
    document.getElementById('sr-drive-list').innerHTML = '<div class="sr-empty">ドライブを検索中...</div>';
    searchGoogleDrive(q);
  } else {
    const driveUrl = 'https://drive.google.com/drive/search?q=' + encodeURIComponent(q);
    document.getElementById('sr-drive-list').innerHTML = `<a class="sr-drive-btn" href="${driveUrl}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div>
        <div>「${q}」をGoogleドライブで検索</div>
        <div class="sr-drive-sub">※ ログインするとここに結果が表示されます</div>
      </div>
    </a>`;
  }
  renderRows();
}

// Google Drive API検索（OAuthトークンで動作）
async function searchGoogleDrive(query) {
  if (!accessToken || !gapiInited) return;
  try {
    const resp = await gapi.client.drive.files.list({
      q: "name contains '" + query.replace(/'/g, "\\'") + "' and trashed = false",
      fields: 'files(id,name,mimeType,webViewLink,iconLink,modifiedTime,owners)',
      pageSize: 10,
      orderBy: 'modifiedTime desc',
      supportsAllDrives: true,
      includeItemsFromAllDrives: true,
      corpora: 'allDrives'
    });
    const files = resp.result.files || [];
    const driveUrl = 'https://drive.google.com/drive/search?q=' + encodeURIComponent(query);
    let html = '';
    if (files.length > 0) {
      html += files.map(function(f) {
        const mime = f.mimeType || '';
        let typeLabel = 'ファイル';
        let dotColor = '#185FA5';
        if (mime.includes('folder')) { typeLabel = 'フォルダ'; dotColor = '#888780'; }
        else if (mime.includes('spreadsheet')) { typeLabel = 'スプレッドシート'; dotColor = '#1D9E75'; }
        else if (mime.includes('presentation')) { typeLabel = 'スライド'; dotColor = '#D4A017'; }
        else if (mime.includes('document')) { typeLabel = 'ドキュメント'; dotColor = '#378ADD'; }
        else if (mime.includes('pdf')) { typeLabel = 'PDF'; dotColor = '#D85A30'; }
        else if (mime.includes('image')) { typeLabel = '画像'; dotColor = '#534AB7'; }
        const link = f.webViewLink || ('https://drive.google.com/file/d/' + f.id + '/view');
        const modified = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString('ja-JP') : '';
        return '<a class="sr-item" href="' + link + '" target="_blank" rel="noopener">' +
          '<span class="sr-dot" style="background:' + dotColor + '"></span>' +
          '<span>' + f.name + '</span>' +
          '<span class="sr-cat">' + typeLabel + (modified ? ' / ' + modified : '') + '</span>' +
        '</a>';
      }).join('');
    } else {
      html += '<div class="sr-empty">ドライブに該当ファイルが見つかりませんでした</div>';
    }
    html += '<a class="sr-drive-btn" href="' + driveUrl + '" target="_blank" rel="noopener" style="margin-top:6px">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '<div><div>ドライブでもっと探す</div></div></a>';
    document.getElementById('sr-drive-list').innerHTML = html;
  } catch (e) {
    console.error('Drive search error:', e);
    const driveUrl = 'https://drive.google.com/drive/search?q=' + encodeURIComponent(query);
    document.getElementById('sr-drive-list').innerHTML = '<a class="sr-drive-btn" href="' + driveUrl + '" target="_blank" rel="noopener">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '<div><div>ドライブで検索する</div></div></a>';
  }
}
function toggleEdit() {
  isEdit = !isEdit;
  const btn = document.getElementById('edit-toggle');
  btn.textContent = isEdit ? '編集を終了' : '編集画面に移動';
  btn.classList.toggle('active', isEdit);
  document.getElementById('edit-banner').classList.toggle('show', isEdit);
  updateUndoBtn();
  renderRows();
}
function openSgModal() {
  editSgIndex = null;
  document.getElementById('sg-modal-title').textContent = 'ブロックを追加';
  document.getElementById('sg-f-cat').innerHTML = cats.map(c => `<option value="${c.key}"${c.key === activeCat ? ' selected' : ''}>${c.key}</option>`).join('');
  document.getElementById('sg-f-name').value = '';
  document.getElementById('sg-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('sg-f-name').focus(), 50);
}
function openSgEditModal(i) {
  editSgIndex = i;
  const sg = subgroups[activeCat][i];
  document.getElementById('sg-modal-title').textContent = 'ブロック名を変更';
  document.getElementById('sg-f-cat').innerHTML = cats.map(c => `<option value="${c.key}"${c.key === activeCat ? ' selected' : ''}>${c.key}</option>`).join('');
  document.getElementById('sg-f-name').value = sg.key;
  document.getElementById('sg-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('sg-f-name').focus(), 50);
}
function closeSgModal() { document.getElementById('sg-modal-bg').classList.remove('open'); }
function saveSg() {
  const cat = document.getElementById('sg-f-cat').value;
  const name = document.getElementById('sg-f-name').value.trim();
  if (!name) return;
  pushUndo();
  if (!subgroups[cat]) subgroups[cat] = [];
  if (editSgIndex !== null) {
    const oldKey = subgroups[cat][editSgIndex].key;
    subgroups[cat][editSgIndex].key = name;
    data.forEach(d => { if (d.cat === cat && d.sg === oldKey) d.sg = name; });
    if (activeSg === oldKey) activeSg = name;
  } else {
    subgroups[cat].push({ key: name, icon: 'doc' });
  }
  closeSgModal(); saveToStorage(); renderRows();
}
function deleteSg(i) {
  const sg = subgroups[activeCat][i];
  if (!confirm(`「${sg.key}」を削除しますか？\n（このブロック内の項目もすべて削除されます）`)) return;
  pushUndo();
  data = data.filter(d => !(d.cat === activeCat && d.sg === sg.key));
  subgroups[activeCat].splice(i, 1);
  if (activeSg === sg.key) activeSg = null;
  saveToStorage(); renderRows();
}
function openItemModal() {
  editIndex = null;
  document.getElementById('item-modal-title').textContent = '項目を追加';
  document.getElementById('f-name').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('item-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}
function openItemEditModal(idx) {
  editIndex = idx;
  const item = data[idx];
  document.getElementById('item-modal-title').textContent = '項目を編集';
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-url').value = item.url;
  document.getElementById('item-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}
function closeItemModal() { document.getElementById('item-modal-bg').classList.remove('open'); }
function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  const url = document.getElementById('f-url').value.trim();
  if (!name || !url) return;
  pushUndo();
  if (editIndex !== null) { data[editIndex] = { ...data[editIndex], name, url }; }
  else { data.push({ cat: activeCat, sg: activeSg, name, url }); }
  closeItemModal(); saveToStorage(); renderRows();
}
function deleteItem(idx) {
  if (confirm('削除しますか？')) { pushUndo(); data.splice(idx, 1); saveToStorage(); renderRows(); }
}
loadFromStorage();
renderTabs(); renderAiSearch(); renderRows();
</script>
